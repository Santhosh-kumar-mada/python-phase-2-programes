<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Python Files Viewer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            display: flex;
            max-width: 1200px;
            margin: 0 auto;
            gap: 20px;
        }
        
        .sidebar {
            width: 300px;
            background: white;
            border-radius: 8px;
            padding: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        
        .sidebar h2 {
            color: #333;
            margin-bottom: 15px;
            font-size: 20px;
        }
        
        .file-list {
            list-style: none;
        }
        
        .file-item {
            padding: 10px;
            margin: 5px 0;
            background: #f0f0f0;
            border-left: 4px solid #667eea;
            cursor: pointer;
            border-radius: 4px;
            transition: all 0.3s;
        }
        
        .file-item:hover {
            background: #e0e0e0;
            transform: translateX(5px);
        }
        
        .file-item.active {
            background: #667eea;
            color: white;
        }
        
        .main-content {
            flex: 1;
            background: white;
            border-radius: 8px;
            padding: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        
        .main-content h3 {
            color: #333;
            margin-bottom: 15px;
        }
        
        pre {
            background: #2d2d2d;
            color: #f8f8f2;
            padding: 15px;
            border-radius: 4px;
            overflow-x: auto;
            font-size: 14px;
            line-height: 1.5;
        }
        
        .placeholder {
            color: #999;
            text-align: center;
            padding: 40px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="sidebar">
            <h2>📁 Python Files</h2>
            <ul class="file-list" id="fileList">
                <li class="placeholder">No files found. Add .py files to the directory.</li>
            </ul>
        </div>
        
        <div class="main-content">
            <h3 id="fileName">Select a file to view</h3>
            <pre id="codeDisplay"><span class="placeholder">Click on a file to display its code</span></pre>
        </div>
    </div>

    <script>
        // Sample Python files data - Replace this with actual file loading
        const pythonFiles = [
            { name: 'hello.py', code: 'print("Hello, World!")' },
            { name: 'calculator.py', code: 'def add(a, b):\n    return a + b\n\nprint(add(5, 3))' },
            { name: 'loop.py', code: 'for i in range(10):\n    print(i)' }
        ];

        const fileList = document.getElementById('fileList');
        const codeDisplay = document.getElementById('codeDisplay');
        const fileName = document.getElementById('fileName');

        // Populate file list
        function loadFiles() {
            fileList.innerHTML = '';
            pythonFiles.forEach((file, index) => {
                const li = document.createElement('li');
                li.className = 'file-item';
                li.textContent = file.name;
                li.onclick = () => displayCode(file, index);
                fileList.appendChild(li);
            });
        }

        // Display code when file is clicked
        function displayCode(file, index) {
            fileName.textContent = file.name;
            codeDisplay.textContent = file.code;
            
            // Update active state
            document.querySelectorAll('.file-item').forEach(item => {
                item.classList.remove('active');
            });
            document.querySelectorAll('.file-item')[index].classList.add('active');
        }

        // Initialize
        loadFiles();
    </script>
</body>
</html>
